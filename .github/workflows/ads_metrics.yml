name: ADS Metrics

on:
  schedule:
    - cron: '50 23 * * *'   # 23:50 UTC every day
  workflow_dispatch:       # allow manual runs

permissions:
  contents: write          # needed to commit updated CSVs back to the repo

jobs:
  collect-traffic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev pkg-config

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # use pre-compiled binaries where available

      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          install.packages("jsonlite", repos = "https://cloud.r-project.org")
          install.packages("httr", repos = "https://cloud.r-project.org")
          install.packages("magicaxis", repos = "https://cloud.r-project.org")
          install.packages("foreach", repos = "https://cloud.r-project.org")

      - name: Install this (ADS) package
        run: R CMD INSTALL .

      - name: Fetch traffic metrics
        env:
          ADS_TOKEN: ${{ secrets.ADS_TOKEN }}
        run: Rscript exec/check_metrics.R

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ASGR_first_metrics.png data/ASGR_all_metrics.png
          # Only commit if there are staged changes
          git diff --staged --quiet || \
            git commit -m "chore: update traffic metrics [$(date -u +%Y-%m-%d)]"
          git push
